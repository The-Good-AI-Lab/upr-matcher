services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DB_BACKEND=local
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MATCH_WORKERS=1
    volumes:
      - ./backend/data:/app/data

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["uv", "run", "worker"]
    env_file:
      - ./backend/.env
    environment:
      - DB_BACKEND=local
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
